<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0; padding:0; background:#f4f4f5; font-family:sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0"
         style="background:#f4f4f5; padding:32px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0"
               style="background:#ffffff; border-radius:12px; overflow:hidden;
                      border:1px solid #e4e4e7;">

          <!-- ── ProfileSpark logo header ───────────────────────────────── -->
          <tr>
            <td style="background:#ffffff; padding:24px 32px; border-bottom:1px solid #e4e4e7;">
              <table cellpadding="0" cellspacing="0" border="0" role="presentation">
                <tr>
                  <td style="padding-right:10px; vertical-align:middle;">
                    <div style="width:34px; height:34px;
                                background:#4f46e5;
                                border-radius:8px; text-align:center;
                                line-height:34px; font-size:18px;
                                color:#ffffff;">&#9733;</div>
                  </td>
                  <td style="vertical-align:middle;">
                    <p style="margin:0; font-size:18px; font-weight:800;
                               color:#1f1f1f; letter-spacing:-0.02em;">ProfileSpark</p>
                    <p style="margin:1px 0 0; font-size:10px; font-weight:500;
                               color:#9ca3af; letter-spacing:0.15em;
                               text-transform:uppercase;">Career Intelligence</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ── Per-email body content ─────────────────────────────────── -->
          <tr>
            <td style="padding:32px;">
              {body_content}
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
